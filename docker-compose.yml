services:
  discord:
    build: ./
    # image: ghcr.io/taichikuji/sakamoto
    restart: unless-stopped
    container_name: sakamoto
    environment:
      - TOKEN=${TOKEN}
      - STEAM_TOKEN=${STEAM_TOKEN}
    volumes:
      - ui_db:/usr/src/app/data
    # Label for updater to detect the service to update
