services:
  discord:
    build: ./
    # image: ghcr.io/taichikuji/ui-py
    restart: unless-stopped
    container_name: ui
    environment:
      - TOKEN=${TOKEN}
      - STEAM_TOKEN=${STEAM_TOKEN}
      - LAVALINK_URI=http://lavalink:2333
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD}
    volumes:
      - ui_db:/usr/src/app/data
    depends_on:
      lavalink:
        condition: service_healthy
    # Label for updater to detect the service to update
    # labels:
    #   - "com.taichikuji.ui-py.enable=true"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    environment:
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
    healthcheck:
      test: "curl -sf http://localhost:2333/version || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment the following section to enable automatic updates on ui-py
  # updater:
  #   build: ./updater
  #   container_name: ui-updater
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - .:/workspace:ro,z
  #   environment:
  #     - CRON_SCHEDULE=${CRON_SCHEDULE:-0 0 * * *}

volumes:
  ui_db: